AWSTemplateFormatVersion: '2010-09-09'
Description: "TP AWS Lambda - Code Chargé depuis src/main.py"

Parameters:
  Environment:
    Type: String
    Description: "Nom de l'environnement (dev, staging, prod)"
    Default: "mblaise"

  BucketName:
    Type: String
    Description: "Nom du bucket S3 pour stocker le code de la fonction Lambda"
    Default: "mblaise-s3-bucket-trigger-lambda"

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName: !Sub "${Environment}-LambdaExecutionRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: !Sub "${Environment}-LambdaS3AccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource:
                  - arn:aws:dynamodb:*:*:table/s3-trigger-db

  # Fonction Lambda pour gérer les événements S3
  LambdaTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Environment}-S3LambdaTrigger"
      Handler: main.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code: ../src

  # S3 Bucket pour stocker les fichiers
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-${BucketName}"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            # Filter:
            #   S3Key:
            #     Rules:
            #       - Name: suffix
            #         Value: ".txt"
            Function: !GetAtt LambdaTrigger.Arn