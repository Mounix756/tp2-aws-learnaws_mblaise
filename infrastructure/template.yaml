AWSTemplateFormatVersion: '2010-09-09'

Description: TP AWS Lambda - Déclenchement S3 avec contrôle des doublons

Parameters:
  Environment:
    Type: String
    Description: Nom de l'environnement
    Default: mblaise

  BucketName:
    Type: String
    Description: Nom du bucket S3
    Default: s3-bucket-trigger-lambda

Resources:

  ImagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-s3-trigger-db"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: file_name
          AttributeType: S
      KeySchema:
        - AttributeName: file_name
          KeyType: HASH

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: !Sub "${Environment}-DynamoDBAccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ImagesTable.Arn

  LambdaTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Environment}-S3LambdaTrigger"
      Runtime: python3.12
      Handler: main.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: ../src
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref ImagesTable

  LambdaPermissionForS3:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaTrigger
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${Environment}-${BucketName}"

  S3Bucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - LambdaPermissionForS3
    Properties:
      BucketName: !Sub "${Environment}-${BucketName}"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:Put
            Function: !GetAtt LambdaTrigger.Arn

Outputs:
  BucketName:
    Description: Nom du bucket S3
    Value: !Ref S3Bucket

  BucketArn:
    Description: ARN du bucket S3
    Value: !GetAtt S3Bucket.Arn

  LambdaFunction:
    Description: Nom de la fonction Lambda
    Value: !Ref LambdaTrigger

  DynamoDBTable:
    Description: Nom de la table DynamoDB
    Value: !Ref ImagesTable